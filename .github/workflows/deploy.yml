name: Build and Release WPF Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PROJECT_PATH: ./src/UI 

jobs:
  build:
    name: Build WPF for ${{ matrix.platform }}
    runs-on: windows-latest
    
    strategy:
      matrix:
        platform: [x86, x64]
        include:
          - platform: x86
            runtime: win-x86
          - platform: x64
            runtime: win-x64
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}
    
    - name: Build WPF App for ${{ matrix.platform }}
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -r ${{ matrix.runtime }} \
          --self-contained true \
          -p:PublishSingleFile=false \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:DebugType=None \
          -p:DebugSymbols=false \
          -p:PublishReadyToRun=true \
          -p:UseAppHost=true \
          --output ./publish/${{ matrix.platform }}
      working-directory: ${{ env.PROJECT_PATH }}
    
    - name: Create ZIP archive for ${{ matrix.platform }}
      run: |
        7z a -tzip ../WPF-App-${{ matrix.platform }}.zip ./publish/${{ matrix.platform }}/*
      shell: powershell
      working-directory: ${{ env.PROJECT_PATH }}
    
    - name: Upload artifacts to workflow
      uses: actions/upload-artifact@v4
      with:
        name: WPF-App-${{ matrix.platform }}
        path: ${{ env.PROJECT_PATH }}/WPF-App-${{ matrix.platform }}.zip
        retention-days: 30

  release:
    name: Create Release and Upload Artifacts
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/*/*.zip
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}