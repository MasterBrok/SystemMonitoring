name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        runtime: [win-x64, win-x86]
        mode: [self, framework]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/UI/UI.csproj

      - name: Publish
        shell: pwsh
        run: |
          $selfContained = "${{ matrix.mode }}" -eq "self"

          $output = "publish/${{ matrix.runtime }}-${{ matrix.mode }}"

          dotnet publish src/UI/UI.csproj `
            -c Release `
            -r ${{ matrix.runtime }} `
            --self-contained $selfContained `
            -p:PublishSingleFile=true `
            -o $output

      - name: Zip output (with clear naming)
        shell: pwsh
        run: |
          $portable = "${{ matrix.mode }}" -eq "self"

          if ($portable) {
            $type = "portable"
          } else {
            $type = "framework-dependent"
          }

          $zipName = "SystemMonitoring-${{ matrix.runtime }}-$type.zip"

          Compress-Archive `
            -Path publish/${{ matrix.runtime }}-${{ matrix.mode }}\* `
            -DestinationPath $zipName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.runtime }}-${{ matrix.mode }}
          path: SystemMonitoring-*.zip

  release:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}